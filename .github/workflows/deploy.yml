name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/CMMS

            echo "--- pull ---"
            git pull origin main

            echo "--- composer ---"
            docker exec cmms_app composer install \
              --no-dev --optimize-autoloader --no-interaction

            echo "--- frontend ---"
            npm ci --prefer-offline
            npm run build

            echo "--- artisan ---"
            docker exec cmms_app php artisan migrate --force
            docker exec cmms_app php artisan config:cache
            docker exec cmms_app php artisan route:cache
            docker exec cmms_app php artisan view:cache

            echo "--- reload php-fpm ---"
            docker exec cmms_app kill -USR2 1

            echo "--- done ---"
